name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - feature/initial-rf-basic-link-calculator
      - track/ux0-baseline
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # e2e はデプロイ前のゲート。失敗時は Build/Deploy に進まず、壊れた内容の公開を防ぐ。
      # ブラウザはキャッシュしてデプロイ時間の増加を抑える（キャッシュヒット時はダウンロードを省略）。
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E test
        run: npm run test:e2e

      - name: Update Snapshots (Linux CI)
        if: github.ref == 'refs/heads/track/ux0-baseline'
        run: |
          npm run test:visual -- --update-snapshots
        env:
          TEST_VISUAL: "true"

      - name: Commit and Push Snapshots
        if: github.ref == 'refs/heads/track/ux0-baseline'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/*-snapshots/
          git commit -m "chore(visual): update visual snapshots on Linux CI" || echo "No changes to commit"
          git push origin track/ux0-baseline

      - name: Build static app
        if: github.ref != 'refs/heads/track/ux0-baseline'
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Deploy to gh-pages branch
        if: github.ref != 'refs/heads/track/ux0-baseline'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./out
          force_orphan: true
