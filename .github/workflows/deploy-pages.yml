name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - feature/initial-rf-basic-link-calculator
      - track/rebaseline6
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # e2e はデプロイ前のゲート。失敗時は Build/Deploy に進まず、壊れた内容の公開を防ぐ。
      # ブラウザはキャッシュしてデプロイ時間の増加を抑える（キャッシュヒット時はダウンロードを省略）。
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E test
        run: npm run test:e2e

      - name: Run Visual Tests and Update Snapshots
        if: github.ref == 'refs/heads/track/rebaseline6'
        run: |
          npx playwright test e2e/visual.spec.ts --update-snapshots
        env:
          TEST_VISUAL: "true"

      - name: Auto Commit and Push Snapshots
        if: github.ref == 'refs/heads/track/rebaseline6'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual.spec.ts-snapshots/*-chromium-linux.png
          git commit -m "chore(visual): re-baseline for wave4: antipatterns, result-hero border, quest p-5, track-i review [rebaseline6]" || true
          git push origin HEAD:track/rebaseline6

      - name: Build static app
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./out
          force_orphan: true
